<html>
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:radial-gradient(circle at top left,#0f172a,#020617);
color:#fff;
}

/* HEADER */

header{
position:relative;
text-align:center;
padding:20px;
}

.auth-btn{
padding:8px 18px;
background:linear-gradient(45deg,#ffcc00,#ff9900);
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
color:#000;
}

/* HERO */

.hero{
text-align:center;
padding:70px 20px;
}

.search-bar input{
padding:12px 20px;
border-radius:30px;
border:none;
width:340px;
background:#1e293b;
color:#fff;
}

/* CATEGORY GRID */

.categories{
max-width:1300px;
margin:40px auto;
padding:0 40px;
}

.category-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.category-card{
background:#1e293b;
border-radius:20px;
padding:30px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.category-card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px rgba(255,204,0,0.3);
}

.category-card i{
font-size:30px;
margin-bottom:12px;
color:#ffcc00;
}

/* TOOL DRAWER */

.tool-drawer{
position:fixed;
bottom:-100%;
left:0;
right:0;
height:70vh;
background:#0f172a;
padding:30px;
overflow-y:auto;
transition:0.4s;
}

.tool-drawer.active{
bottom:0;
}

.tool-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* OPEN BUTTON */

.open-btn{
background:linear-gradient(45deg,#ffcc00,#ffaa00);
border:none;
padding:8px 20px;
border-radius:30px;
font-weight:600;
cursor:pointer;
color:#000;
}

/* LOGIN MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.modal-content{
position:relative;
background:#1e293b;
padding:35px;
border-radius:20px;
width:320px;
text-align:center;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

.close-btn{
position:absolute;
top:10px;
left:12px;
background:none;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
}

</style>

<button class="close-btn" onclick="closeLogin()">←</button>

<h3>Sign In</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="emailAuth()" class="auth-btn">Submit</button>

<hr style="margin:15px 0;border-color:#333;">

<button onclick="googleLogin()" class="auth-btn">
Continue with Google
</button>

</div>

/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"AIzaSyBdCSsh51bRNawK1t-ISAiqyVBn7HohJo0",

projectId:"smart-industry-ai-tool-hub",
appId:"1:377298817291:web:0713080718ecad88c8520e"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
let currentUser=null;

/* AUTH STATE */

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user;

document.getElementById("loginBtn").style.display="none";
document.getElementById("userProfile").style.display="block";
document.getElementById("userEmail").innerText=user.email;

document.getElementById("loginModal").style.display="none";

}else{

currentUser=null;

document.getElementById("loginBtn").style.display="inline-block";
document.getElementById("userProfile").style.display="none";

closeDrawer();

}

});

/* LOGIN */

function openLogin(){
document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
document.getElementById("loginModal").style.display="none";
}

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider();

provider.setCustomParameters({
prompt:"select_account"
});

auth.signInWithPopup(provider);

}

function emailAuth(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)
.catch(err=>alert(err.message));

}

function logout(){
auth.signOut();
closeDrawer();
}

/* LOAD CATEGORIES */

function loadCategories(){

let grid=document.getElementById("categoryGrid");

grid.innerHTML="";

Object.keys(toolsData).forEach(category=>{

grid.innerHTML+=`
<div class="category-card" onclick="showTools('${category}')">
<i class="fas ${getIcon(category)}"></i>
<p>${category}</p>
</div>`;

});

}

/* SHOW TOOLS */

function showTools(category){

if(!currentUser){
openLogin();
return;
}

let drawer=document.getElementById("toolDrawer");

drawer.innerHTML=`
<div style="text-align:center;margin-bottom:20px;">
<h2>${category}</h2>
<button onclick="closeDrawer()" class="auth-btn">← Back</button>
</div>
<hr style="margin-bottom:15px;">
`;

toolsData[category].forEach(tool=>{

drawer.innerHTML+=`
<div class="tool-card">
<div>
<strong>${tool.name}</strong><br>
<small style="color:#aaa">${tool.desc}</small>
</div>
<button class="open-btn" onclick="openTool('${tool.link}')">Open</button>
</div>`;

});

drawer.classList.add("active");

}

/* CLOSE DRAWER */

function closeDrawer(){
document.getElementById("toolDrawer").classList.remove("active");
}

/* OPEN TOOL */

function openTool(link){

if(!currentUser){
openLogin();
return;
}

window.open(link,'_blank');

}

/* SEARCH */

function filterCategories(){

let input=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll(".category-card").forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(input)
?"block":"none";

});

}

loadCategories();
